<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{name}} // KURAYS.DEV</title>

    <meta property="og:title" content="{{name}}"/>
    <meta property="og:type" content="article"/>
    <meta property="og:url" content="https://blog.kurays.dev"/>
    <meta property="og:description" content="Egor Abramov Blog"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <style>
        /* ==================== */
        /* RESET & BASE STYLES  */
        /* ==================== */
        :root {
            --black: #000000;
            --dark: #0A0A0A;
            --gray-dark: #1A1A1A;
            --gray-light: #666666;
            --gray-lighter: #999999;
            --white: #FFFFFF;

            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --border-width: 1px;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--black);
            color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ==================== */
        /* READING PROGRESS     */
        /* ==================== */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: transparent;
            z-index: 9999;
        }

        .progress-bar {
            height: 100%;
            background: var(--white);
            width: 0%;
            /* Убрано скругление для сохранения брутальности */
            border-radius: 0;
        }

        /* ==================== */
        /* NAVIGATION           */
        /* ==================== */
        .navbar {
            border-bottom: var(--border-width) solid var(--border-color);
            padding: 1.5rem 0;
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--white);
        }

        .nav-link {
            color: var(--gray-lighter);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.15s ease;
        }

        .nav-link:hover {
            color: var(--white);
        }

        /* ==================== */
        /* MARKDOWN OVERRIDES   */
        /* ==================== */
        main {
            min-height: 60vh;
        }

        .markdown-body {
            background-color: transparent !important;
            color: var(--white) !important;
            font-family: var(--font-primary) !important;
        }

        .markdown-body pre,
        .markdown-body code,
        .markdown-body img,
        .markdown-body blockquote,
        .markdown-body table th,
        .markdown-body table td {
            border-radius: 0 !important;
        }

        .markdown-body pre {
            background-color: var(--dark) !important;
            border: var(--border-width) solid var(--border-color) !important;
        }

        .markdown-body img {
            border: var(--border-width) solid var(--border-color);
            background-color: var(--black);
        }

        .markdown-body h1,
        .markdown-body h2 {
            border-bottom: var(--border-width) solid var(--border-color) !important;
            padding-bottom: 0.5rem;
            font-weight: 900 !important;
            letter-spacing: -0.02em;
        }

        .markdown-body blockquote {
            border-left: 3px solid var(--white) !important;
            color: var(--gray-lighter) !important;
            background: var(--gray-dark);
            padding: 1rem !important;
        }

        .markdown-body a {
            color: var(--white) !important;
            text-decoration: underline;
            text-decoration-color: var(--gray-lighter);
            text-underline-offset: 4px;
        }

        .markdown-body a:hover {
            text-decoration-color: var(--white);
        }

        /* ==================== */
        /* FOOTER               */
        /* ==================== */
        .footer {
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: var(--border-width) solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-info p {
            color: var(--gray-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-info a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-info a:hover {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        @media (max-width: 768px) {
            .container { padding: 0 1.5rem; }
            .footer { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>

<body>
    <div class="progress-container">
        <div class="progress-bar" id="readingProgress"></div>
    </div>

    <div class="container">
        <nav class="navbar">
            <a href="https://kurays.dev" class="logo">KURAYS.DEV</a>
            <a href="/blog" class="nav-link">← Back to Blog</a>
        </nav>

        <main class="markdown-body">
            {{{content}}}
        </main>

        <footer class="footer">
            <div class="footer-info">
                <p>Author: Egor Abramov</p>
            </div>
            <div class="footer-info">
                <p><a href="mailto:me@kurays.dev">me@kurays.dev</a></p>
            </div>
        </footer>
    </div>

    <script>
        hljs.initHighlightingOnLoad();

        // Логика прогресс-бара
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("readingProgress").style.width = scrolled + "%";
        };
    </script>
</body>
</html>
